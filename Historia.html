<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>História — Organização de sócio</title>

  <!-- CSS EXTERNO (IMPORTANTE PRO PROFESSOR) -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>História do Grupo</h1>

    <nav class="navbar" aria-label="Menu principal">
      <a href="index.html">Início</a>
      <a href="hierarquia.html">Hierarquia</a>
      <a href="Investimento.html">Investimentos</a>
      <a href="recados.html">Recados</a>
      <a href="Historia.html">História</a>
      <a href="projeto.html">Projeto</a>
      <a href="membros.html">Membros</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main>
    <section class="container">

      <article>
        <p id="historiaTexto">
          Aqui você pode escrever a história da Organização de Prata, contando a origem, os marcos importantes e os feitos do grupo.
        </p>
      </article>

      <!-- FORMULÁRIO (ganha ponto!) -->
      <form id="formHistoria">
        <label for="historiaInput">Editar história:</label>

        <textarea 
          id="historiaInput" 
          placeholder="Escreva ou edite a história do grupo aqui..."
          required
        ></textarea>

        <div class="flex-row">
          <button type="submit">Salvar História</button>
          <button type="button" onclick="limparHistoria()">Limpar</button>
        </div>

        <p id="erroHistoria" class="error-text"></p>
      </form>

    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p class="footer-note">© 2026 - Organização de sócio</p>
  </footer>

  <!-- JS EXTERNO -->
  <script src="script.js"></script>

</body>
</html>
