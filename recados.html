<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recados — Organização de Prata</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Recados (Mural)</h1>

    <nav class="navbar" aria-label="Menu principal">
      <a href="index.html">Início</a>
      <a href="hierarquia.html">Hierarquia</a>
      <a href="Investimento.html">Investimentos</a>
      <a href="recados.html" class="active">Recados</a>
      <a href="Historia.html">História</a>
      <a href="projeto.html">Projetos</a>
      <a href="membros.html">Membros</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main>
    <section class="container">

      <h2>Novo recado</h2>

      <!-- FORM -->
      <form id="formRecado">
        <input id="autorRecado" placeholder="Seu nome (opcional)">
        <textarea id="textoRecado" rows="4" placeholder="Escreva seu recado..." required></textarea>

        <div class="flex-row">
          <button type="submit">Postar</button>
          <button type="button" onclick="limparRecados()">Limpar mural</button>
        </div>

        <p id="erroRecado" class="error-text"></p>
      </form>

      <h3 style="margin-top:18px">Mural</h3>
      <ul id="listaRecados"></ul>

      <p class="footer-note">
        Recados ficam salvos localmente no navegador.
      </p>

    </section>
  </main>

  <footer>
    <p class="footer-note">© 2026 - Organização de sócio</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
